<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MűszakApp</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MűszakApp">
<meta name="theme-color" content="#0B0D12">
<style>
:root{--day:#F5A623;--night:#7B8CFF;--free:#2DCB8A;--sub:#FF5E5E;--subd:#FF9A3C;--hol:#E040FB;--bg:#0B0D12;--bg2:#13161F;--bg3:#1A1E2C;--bord:rgba(255,255,255,.08);--text:#F0F1F5;--muted:#5C6270;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;}
body{overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;}
.clockbar{flex:0 0 auto;background:#0D1019;border-bottom:1px solid var(--bord);padding:8px 14px;display:flex;align-items:center;gap:8px;}
.clock-time{font-size:26px;font-weight:800;color:#fff;min-width:105px;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.shift-now{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--bord);border-radius:11px;padding:6px 10px;flex:1;min-width:0;}
.shift-now-ico{font-size:18px;flex:0 0 auto;}
.shift-now-type{font-size:12px;font-weight:800;line-height:1.2;}
.shift-now-sub{font-size:10px;color:var(--muted);}
.clock-date{font-size:9px;font-weight:600;color:var(--muted);text-align:right;flex:0 0 auto;line-height:1.6;}
header{flex:0 0 auto;background:rgba(11,13,18,.98);border-bottom:1px solid var(--bord);padding:8px 14px 0;}
.logo{font-size:17px;font-weight:800;background:linear-gradient(120deg,#F5A623,#9B6EF5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:7px;}
.mrow{display:flex;align-items:center;gap:5px;}
.marr{background:none;border:1px solid var(--bord);color:var(--muted);width:28px;height:28px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.marr:active{background:var(--bg3);}
.mscroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;padding-bottom:7px;}
.mscroll::-webkit-scrollbar{display:none;}
.mbtn{flex:0 0 auto;padding:4px 10px;border-radius:13px;border:1px solid var(--bord);background:var(--bg2);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;}
.mbtn.active{background:linear-gradient(120deg,#F5A623,#E8821D);color:#000;border-color:transparent;}
.legend{display:flex;gap:8px;padding:4px 0 7px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:2px;}
.swipe-outer{flex:1;overflow:hidden;position:relative;}
.swipe-track{display:flex;height:100%;transition:transform .34s cubic-bezier(.4,0,.2,1);will-change:transform;}
.swipe-page{flex:0 0 100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-inner{max-width:480px;margin:0 auto;padding:0 10px 100px;}
.mtitle{font-size:22px;font-weight:800;letter-spacing:-1px;padding:10px 2px 6px;display:flex;align-items:baseline;gap:8px;}
.mtitle small{font-size:12px;font-weight:500;color:var(--muted);}
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px;}
.sc{background:var(--bg2);border:1px solid var(--bord);border-radius:11px;padding:9px;}
.sc-v{font-size:20px;font-weight:800;}
.sc-l{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;}
.wlbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.wl{text-align:center;font-size:9px;font-weight:700;color:var(--muted);padding:2px 0;}
.wl:nth-child(6),.wl:nth-child(7){color:rgba(255,94,94,.75);}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dc{border-radius:11px;aspect-ratio:1/1.3;border:1.5px solid var(--bord);cursor:pointer;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative;transition:transform .12s;}
.dc:active{transform:scale(.88);}
.dc.empty{background:transparent;border-color:transparent;pointer-events:none;}
.dc.day{background:rgba(245,166,35,.16);border-color:rgba(245,166,35,.3);}
.dc.night{background:rgba(123,140,255,.15);border-color:rgba(123,140,255,.3);}
.dc.free{background:rgba(45,203,138,.10);border-color:rgba(45,203,138,.22);}
.dc.sub{background:rgba(255,94,94,.14);border-color:rgba(255,94,94,.3);}
.dc.sub-day{background:rgba(255,154,60,.13);border-color:rgba(255,154,60,.27);}
.dc.holiday{border-color:rgba(224,64,251,.55)!important;}
.hol-dot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--hol);}
.dc-bar{height:5px;width:100%;flex-shrink:0;}
.dc.day .dc-bar{background:var(--day);}
.dc.night .dc-bar{background:var(--night);}
.dc.free .dc-bar{background:var(--free);}
.dc.sub .dc-bar{background:var(--sub);}
.dc.sub-day .dc-bar{background:var(--subd);}
.dc.today{box-shadow:0 0 0 2.5px var(--free),0 0 16px rgba(45,203,138,.3)!important;}
.dc-ico{font-size:14px;line-height:1;margin-top:5px;}
.dc-num{font-size:15px;font-weight:800;line-height:1;margin-top:2px;}
.dc.day .dc-num{color:var(--day);}
.dc.night .dc-num{color:var(--night);}
.dc.free .dc-num{color:var(--free);}
.dc.sub .dc-num{color:var(--sub);}
.dc.sub-day .dc-num{color:var(--subd);}
.dc.today .dc-num{color:#fff;}
.dc.weekend .dc-num{opacity:.65;}
.dc-lbl{font-size:7.5px;font-weight:800;letter-spacing:.4px;padding:2px 3px;border-radius:4px;margin-top:auto;margin-bottom:4px;line-height:1.3;text-align:center;width:calc(100% - 6px);}
.dc.day .dc-lbl{background:rgba(245,166,35,.3);color:var(--day);}
.dc.night .dc-lbl{background:rgba(123,140,255,.3);color:var(--night);}
.dc.free .dc-lbl{background:rgba(45,203,138,.24);color:var(--free);}
.dc.sub .dc-lbl{background:rgba(255,94,94,.26);color:var(--sub);}
.dc.sub-day .dc-lbl{background:rgba(255,154,60,.26);color:var(--subd);}
.ovrdt{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:#fff;opacity:.65;}
.sechdr{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:14px 2px 7px;}
.ucard{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--bord);border-radius:13px;padding:11px 13px;margin-bottom:6px;cursor:pointer;}
.ucard:active{background:var(--bg3);}
.ucard.today-card{border-color:rgba(45,203,138,.4);background:rgba(45,203,138,.07);}
.ucard-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
.ucard-ico.day{background:rgba(245,166,35,.18);}
.ucard-ico.night{background:rgba(123,140,255,.18);}
.ucard-ico.free{background:rgba(45,203,138,.15);}
.ucard-ico.sub{background:rgba(255,94,94,.16);}
.ucard-ico.sub-day{background:rgba(255,154,60,.16);}
.ucard-body{flex:1;min-width:0;}
.ucard-date{font-size:13px;font-weight:600;}
.ucard-hol{font-size:10px;color:var(--hol);font-weight:600;margin-top:1px;}
.ucard-desc{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ubadge{font-size:10px;font-weight:800;letter-spacing:.4px;padding:4px 9px;border-radius:18px;flex:0 0 auto;}
.ubadge.day{background:rgba(245,166,35,.22);color:var(--day);}
.ubadge.night{background:rgba(123,140,255,.22);color:var(--night);}
.ubadge.free{background:rgba(45,203,138,.18);color:var(--free);}
.ubadge.sub{background:rgba(255,94,94,.2);color:var(--sub);}
.ubadge.sub-day{background:rgba(255,154,60,.2);color:var(--subd);}
.share-box{background:var(--bg2);border:1px solid var(--bord);border-radius:14px;padding:13px 14px;margin:8px 0 20px;}
.share-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.sbtn{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
.sbtn.copy{background:rgba(123,140,255,.2);color:var(--night);}
.sbtn.wa{background:rgba(37,211,102,.18);color:#25D366;}
.sbtn.mail{background:rgba(245,166,35,.2);color:var(--day);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--bord);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:16px 16px 40px;transform:translateY(80px);transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.overlay.open .modal{transform:translateY(0);}
.mhandle{width:32px;height:4px;border-radius:2px;background:var(--bord);margin:0 auto 14px;}
.mdate{font-size:19px;font-weight:800;margin-bottom:2px;}
.mcurr{font-size:11px;color:var(--muted);margin-bottom:12px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.tbtn{padding:11px 6px;border-radius:11px;border:1px solid var(--bord);background:var(--bg3);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;}
.tbtn.active{border-color:transparent;}
.tbtn.active.day{background:var(--day);color:#000;}
.tbtn.active.night{background:var(--night);color:#fff;}
.tbtn.active.free{background:var(--free);color:#000;}
.tbtn.active.sub{background:var(--sub);color:#fff;}
.tbtn.active.sub-day{background:var(--subd);color:#000;}
.mlbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin:0 0 5px;}
.minput{width:100%;background:var(--bg3);border:1px solid var(--bord);border-radius:9px;color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;resize:none;}
.minput:focus{border-color:rgba(123,140,255,.5);}
.macts{display:flex;gap:7px;margin-top:14px;}
.msave{flex:1;padding:13px;border-radius:11px;background:linear-gradient(135deg,#7B8CFF,#9B6EF5);color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit;}
.mdel{padding:13px 15px;border-radius:11px;background:rgba(255,94,94,.14);color:var(--sub);font-weight:600;font-size:14px;border:1px solid rgba(255,94,94,.3);cursor:pointer;font-family:inherit;}
.mclose{width:100%;padding:12px;border-radius:11px;background:var(--bg3);color:var(--muted);font-weight:600;font-size:14px;border:1px solid var(--bord);cursor:pointer;margin-top:7px;font-family:inherit;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--free);color:#000;padding:8px 18px;border-radius:18px;font-weight:700;font-size:12px;opacity:0;transition:all .28s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="clockbar">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="shift-now">
    <div class="shift-now-ico" id="shiftIco">⏳</div>
    <div>
      <div class="shift-now-type" id="shiftType">...</div>
      <div class="shift-now-sub" id="shiftSub"></div>
    </div>
  </div>
  <div class="clock-date" id="clockDate">--</div>
</div>

<header>
  <div class="logo">⏱ MűszakApp</div>
  <div class="mrow">
    <button class="marr" onclick="shiftMonth(-1)">‹</button>
    <div class="mscroll" id="mscroll"></div>
    <button class="marr" onclick="shiftMonth(1)">›</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="ldot" style="background:var(--day)"></div>NAPPAL</div>
    <div class="leg"><div class="ldot" style="background:var(--night)"></div>ÉJSZAKA</div>
    <div class="leg"><div class="ldot" style="background:var(--free)"></div>SZABAD</div>
    <div class="leg"><div class="ldot" style="background:var(--sub)"></div>HELYETTES.</div>
    <div class="leg"><div class="ldot" style="background:var(--hol)"></div>ÜNNEP</div>
  </div>
</header>

<div class="swipe-outer" id="swipeOuter">
  <div class="swipe-track" id="swipeTrack"></div>
</div>

<div class="overlay" id="overlay" onclick="oClick(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mdate" id="mDate"></div>
    <div class="mcurr" id="mCurr"></div>
    <div class="tgrid">
      <button class="tbtn day" data-t="day">☀️ Nappalos</button>
      <button class="tbtn night" data-t="night">🌙 Éjszakás</button>
      <button class="tbtn free" data-t="free">✨ Szabad</button>
      <button class="tbtn sub" data-t="sub">🔄 Helyet. Éjjel</button>
      <button class="tbtn sub-day" data-t="sub-day">🔄 Helyet. Nappal</button>
    </div>
    <div class="mlbl">MEGJEGYZÉS / KOLLÉGA NEVE</div>
    <textarea class="minput" id="mNote" rows="3" placeholder="Pl.: Attila helyett, 18:00-06:00..."></textarea>
    <div class="macts">
      <button class="msave" onclick="saveModal()">💾 Mentés</button>
      <button class="mdel" onclick="delModal()">🗑</button>
    </div>
    <button class="mclose" onclick="closeModal()">Mégse</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const MNAMES=['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
const MSHORT=['jan','feb','már','ápr','máj','jún','júl','aug','szep','okt','nov','dec'];
const DFULL=['Vasárnap','Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat'];
const DSHORT=['V','H','K','Sze','Cs','P','Szo'];
const NAPOK=['vasárnap','hétfő','kedd','szerda','csütörtök','péntek','szombat'];
const ICONS={day:'☀️',night:'🌙',free:'✨',sub:'🔄','sub-day':'🔄'};
const LABELS={day:'NAP',night:'ÉJJ',free:'SZB',sub:'H.É','sub-day':'H.N'};
const DESCS={day:'Nappalos 06:00–18:00',night:'Éjszakás 18:00–06:00',free:'Szabad nap',sub:'Helyet. éjszaka','sub-day':'Helyet. nappal'};

const HOLIDAYS={
  "2026-01-01":"Újév","2026-03-15":"Nemzeti ünnep",
  "2026-04-03":"Nagypéntek","2026-04-05":"Húsvét vasárnap","2026-04-06":"Húsvét hétfő",
  "2026-05-01":"Munka ünnepe",
  "2026-05-23":"Pünkösd szombat","2026-05-24":"Pünkösd vasárnap","2026-05-25":"Pünkösd hétfő",
  "2026-08-20":"Államalapítás","2026-10-23":"Nemzeti ünnep","2026-11-01":"Mindenszentek",
  "2026-12-24":"Szenteste","2026-12-25":"Karácsony 1.","2026-12-26":"Karácsony 2.",
  "2027-01-01":"Újév","2027-03-15":"Nemzeti ünnep",
  "2027-03-26":"Nagypéntek","2027-03-28":"Húsvét vasárnap","2027-03-29":"Húsvét hétfő",
  "2027-05-01":"Munka ünnepe",
  "2027-05-15":"Pünkösd szombat","2027-05-16":"Pünkösd vasárnap","2027-05-17":"Pünkösd hétfő",
  "2027-08-20":"Államalapítás","2027-10-23":"Nemzeti ünnep","2027-11-01":"Mindenszentek",
  "2027-12-24":"Szenteste","2027-12-25":"Karácsony 1.","2027-12-26":"Karácsony 2."
};

function updateClock(){
  var now=new Date();
  var h=String(now.getHours()).padStart(2,'0');
  var m=String(now.getMinutes()).padStart(2,'0');
  var s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent=h+':'+m+':'+s;
  document.getElementById('clockDate').textContent=now.getFullYear()+'. '+MSHORT[now.getMonth()]+'. '+now.getDate()+'. '+NAPOK[now.getDay()];
  var shift=getShift(now);
  var snames={day:'Nappalos műszak',night:'Éjszakás műszak',free:'Szabad nap',sub:'Helyettesítés éjjel','sub-day':'Helyettesítés nappal'};
  var stimes={day:'06:00–18:00',night:'18:00–06:00',free:'pihenőnap',sub:'éjszakás','sub-day':'nappalos'};
  document.getElementById('shiftIco').textContent=ICONS[shift.type]||'⏳';
  document.getElementById('shiftType').textContent=snames[shift.type]||shift.type;
  document.getElementById('shiftSub').textContent=shift.note||(stimes[shift.type]||'');
}
setInterval(updateClock,1000);
updateClock();

function cycleType(date){
  var d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  var r=new Date(2026,3,27);
  var p=((Math.round((d-r)/86400000)%16)+16)%16;
  return p<4?'day':p<8?'free':p<12?'night':'free';
}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getOvr(){try{return JSON.parse(localStorage.getItem('ms3')||'{}')}catch(e){return {};}}
function setOvr(o){try{localStorage.setItem('ms3',JSON.stringify(o));}catch(e){}}
function getShift(date){var k=dk(date);var o=getOvr();return o[k]||{type:cycleType(date),note:''};}

var MONTHS=[];
for(var y=2026;y<=2027;y++){for(var m=0;m<12;m++){if(y===2026&&m<3)continue;MONTHS.push({y:y,m:m});}}
var nowInit=new Date();
var curIdx=0;
for(var i=0;i<MONTHS.length;i++){if(MONTHS[i].y===nowInit.getFullYear()&&MONTHS[i].m===nowInit.getMonth()){curIdx=i;break;}}
var pages=[];

function buildAllPages(){
  var track=document.getElementById('swipeTrack');
  track.innerHTML='';pages=[];
  for(var i=0;i<MONTHS.length;i++){
    var p=document.createElement('div');
    p.className='swipe-page';
    p.innerHTML='<div class="page-inner">'+pageHTML(MONTHS[i].y,MONTHS[i].m)+'</div>';
    track.appendChild(p);pages.push(p);
  }
  setPos(false);attachSwipe();
}

function rebuildPages(){
  for(var i=0;i<pages.length;i++){pages[i].querySelector('.page-inner').innerHTML=pageHTML(MONTHS[i].y,MONTHS[i].m);}
}

function pageHTML(y,m){
  var now=new Date();
  var last=new Date(y,m+1,0);
  var first=new Date(y,m,1);
  var startDow=(first.getDay()+6)%7;
  var dayCnt=0,nightCnt=0,hrs=0;
  for(var d=1;d<=last.getDate();d++){
    var s=getShift(new Date(y,m,d));
    if(s.type==='day'){dayCnt++;hrs+=12;}
    else if(s.type==='night'){nightCnt++;hrs+=12;}
    else if(s.type==='sub'||s.type==='sub-day')hrs+=12;
  }
  var h='<div class="mtitle">'+MNAMES[m]+' <small>'+y+'</small></div>';
  h+='<div class="sumrow">';
  h+='<div class="sc"><div class="sc-v" style="color:var(--day)">'+dayCnt+'</div><div class="sc-l">☀️ NAP</div></div>';
  h+='<div class="sc"><div class="sc-v" style="color:var(--night)">'+nightCnt+'</div><div class="sc-l">🌙 ÉJSZAKA</div></div>';
  h+='<div class="sc"><div class="sc-v" style="color:var(--day)">'+hrs+'h</div><div class="sc-l">⏱ ÓRA</div></div>';
  h+='</div>';
  h+='<div class="wlbls"><div class="wl">H</div><div class="wl">K</div><div class="wl">Sze</div><div class="wl">Cs</div><div class="wl">P</div><div class="wl">Szo</div><div class="wl">V</div></div>';
  h+='<div class="calgrid">';
  for(var i=0;i<startDow;i++) h+='<div class="dc empty"></div>';
  var ovr=getOvr();
  for(var d=1;d<=last.getDate();d++){
    var dt=new Date(y,m,d);var s=getShift(dt);var key=dk(dt);
    var isT=(dt.getFullYear()===now.getFullYear()&&dt.getMonth()===now.getMonth()&&dt.getDate()===now.getDate());
    var isO=!!ovr[key];
    var dow=dt.getDay();var isWE=(dow===0||dow===6);
    var holName=HOLIDAYS[key]||'';
    var cls='dc '+s.type+(isT?' today':'')+(holName?' holiday':'')+(isWE?' weekend':'');
    h+='<div class="'+cls+'" onclick="openModal(''+key+'')">';
    h+='<div class="dc-bar"></div>';
    if(holName) h+='<div class="hol-dot"></div>';
    if(isO) h+='<div class="ovrdt"></div>';
    h+='<div class="dc-ico">'+ICONS[s.type]+'</div>';
    h+='<div class="dc-num">'+d+'</div>';
    h+='<div class="dc-lbl">'+LABELS[s.type]+'</div>';
    h+='</div>';
  }
  h+='</div>';
  var todayInRange=(new Date(y,m,1)<=now&&now<=new Date(y,m+1,0));
  var nextMonth=new Date(now.getFullYear(),now.getMonth()+1,1);
  var nextInRange=(new Date(y,m,1).getTime()===nextMonth.getTime());
  if(todayInRange||nextInRange){
    h+='<div class="sechdr">🗓️ Közelgő műszakok</div>';
    for(var i=0;i<10;i++){
      var dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);
      var s=getShift(dt);var holN=HOLIDAYS[dk(dt)]||'';var isToday=(i===0);
      h+='<div class="ucard'+(isToday?' today-card':'')+'" onclick="openModal(''+dk(dt)+'')">';
      h+='<div class="ucard-ico '+s.type+'">'+ICONS[s.type]+'</div>';
      h+='<div class="ucard-body">';
      h+='<div class="ucard-date">'+(isToday?'🟢 MA: ':'')+DFULL[dt.getDay()]+', '+(dt.getMonth()+1)+'. '+dt.getDate()+'.</div>';
      if(holN) h+='<div class="ucard-hol">🎉 '+holN+'</div>';
      h+='<div class="ucard-desc">'+(s.note||DESCS[s.type])+'</div>';
      h+='</div>';
      h+='<div class="ubadge '+s.type+'">'+LABELS[s.type]+'</div>';
      h+='</div>';
    }
  }
  h+='<div class="sechdr">📤 Megosztás</div>';
  h+='<div class="share-box">';
  h+='<div style="font-size:11px;color:var(--muted)">Küldd el a párodnak vagy kollégádnak</div>';
  h+='<div class="share-row">';
  h+='<button class="sbtn copy" onclick="doCopy('+y+','+m+')">📋 Másolás</button>';
  h+='<button class="sbtn wa" onclick="doWA('+y+','+m+')">💬 WhatsApp</button>';
  h+='<button class="sbtn mail" onclick="doMail('+y+','+m+')">📧 Email</button>';
  h+='</div></div>';
  return h;
}

function setPos(anim){
  var t=document.getElementById('swipeTrack');
  t.style.transition=anim?'transform .34s cubic-bezier(.4,0,.2,1)':'none';
  t.style.transform='translateX('+(-curIdx*100)+'%)';
}
function goTo(idx,anim){
  if(anim===undefined)anim=true;
  curIdx=Math.max(0,Math.min(MONTHS.length-1,idx));
  setPos(anim);syncNav();
  setTimeout(function(){if(pages[curIdx])pages[curIdx].scrollTop=0;},60);
}
function shiftMonth(d){goTo(curIdx+d);}

var sx=0,sy=0,swiping=false,scrolling=false;
function attachSwipe(){
  var el=document.getElementById('swipeOuter');
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=false;scrolling=false;},{passive:true});
  el.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!swiping&&!scrolling){if(Math.abs(dx)>Math.abs(dy)+8)swiping=true;else if(Math.abs(dy)>Math.abs(dx)+8)scrolling=true;}
    if(swiping){e.preventDefault();var t=document.getElementById('swipeTrack');t.style.transition='none';t.style.transform='translateX(calc('+(-curIdx*100)+'% + '+dx+'px))';}
  },{passive:false});
  el.addEventListener('touchend',function(e){
    if(!swiping)return;
    var dx=e.changedTouches[0].clientX-sx;
    if(dx<-50)goTo(curIdx+1);else if(dx>50)goTo(curIdx-1);else setPos(true);
    swiping=false;
  });
}

function buildNav(){
  var sc=document.getElementById('mscroll');sc.innerHTML='';
  for(var i=0;i<MONTHS.length;i++){
    (function(idx){
      var b=document.createElement('button');
      b.className='mbtn'+(idx===curIdx?' active':'');
      b.textContent=MSHORT[MONTHS[idx].m]+' '+MONTHS[idx].y;
      b.onclick=function(){goTo(idx);};
      sc.appendChild(b);
    })(i);
  }
  scrollActiveNav();
}
function syncNav(){
  var btns=document.querySelectorAll('#mscroll .mbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.toggle('active',i===curIdx);
  scrollActiveNav();
}
function scrollActiveNav(){
  var a=document.querySelector('#mscroll .mbtn.active');
  if(a)setTimeout(function(){a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},50);
}

var mKey=null,selType=null;
var tbns=document.querySelectorAll('.tbtn');
for(var i=0;i<tbns.length;i++){
  (function(b){b.onclick=function(){selType=b.dataset.t;for(var j=0;j<tbns.length;j++)tbns[j].classList.remove('active');b.classList.add('active');};})(tbns[i]);
}
function openModal(key){
  mKey=key;
  var parts=key.split('-');var y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);
  var dt=new Date(y,m-1,d);var s=getShift(dt);selType=s.type;
  var holN=HOLIDAYS[key]||'';
  document.getElementById('mDate').textContent=DFULL[dt.getDay()]+', '+y+'. '+MSHORT[m-1]+'. '+d+'.';
  document.getElementById('mCurr').textContent=(holN?'🎉 '+holN+' – ':'')+DESCS[s.type];
  document.getElementById('mNote').value=s.note||'';
  var tbs=document.querySelectorAll('.tbtn');
  for(var i=0;i<tbs.length;i++)tbs[i].classList.toggle('active',tbs[i].dataset.t===selType);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function saveModal(){
  var o=getOvr();var parts=mKey.split('-');var y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);
  var base=cycleType(new Date(y,m-1,d));var note=document.getElementById('mNote').value.trim();
  if(selType===base&&!note)delete o[mKey];else o[mKey]={type:selType,note:note};
  setOvr(o);closeModal();rebuildPages();showToast('✅ Mentve!');
}
function delModal(){var o=getOvr();delete o[mKey];setOvr(o);closeModal();rebuildPages();showToast('🗑️ Törölve');}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function oClick(e){if(e.target.id==='overlay')closeModal();}

function buildTxt(y,m){
  var t='Műszak – '+MNAMES[m]+' '+y+'\n\n';
  var lmap={day:'☀️ Nappal',night:'🌙 Éjszaka',free:'✨ Szabad',sub:'🔄 H.É','sub-day':'🔄 H.N'};
  var days=new Date(y,m+1,0).getDate();
  for(var d=1;d<=days;d++){
    var dt=new Date(y,m,d);var s=getShift(dt);var hol=HOLIDAYS[dk(dt)]||'';
    t+=String(d).padStart(2,'0')+'. '+DSHORT[dt.getDay()]+'  '+lmap[s.type];
    if(hol)t+=' 🎉'+hol;if(s.note)t+=' – '+s.note;t+='\n';
  }
  return t+'\n📱 MűszakApp';
}
function doCopy(y,m){navigator.clipboard.writeText(buildTxt(y,m)).then(function(){showToast('📋 Másolva!');}).catch(function(){showToast('Hiba');});}
function doWA(y,m){window.open('https://wa.me/?text='+encodeURIComponent(buildTxt(y,m)));}
function doMail(y,m){window.location.href='mailto:?subject=Muszak&body='+encodeURIComponent(buildTxt(y,m));}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

(function(){
  try{
    var o=getOvr();
    if(!o['2026-05-03'])o['2026-05-03']={type:'sub',note:'Attila helyett'};
    if(!o['2026-05-04'])o['2026-05-04']={type:'sub',note:'Attila helyett'};
    setOvr(o);
  }catch(e){}
})();

try{
  buildNav();
  buildAllPages();
}catch(e){
  document.getElementById('swipeTrack').innerHTML='<div style="color:#FF5E5E;padding:20px;font-size:13px">Hiba: '+e.message+'<br>'+e.stack+'</div>';
}

</script>
</body>
</html>
