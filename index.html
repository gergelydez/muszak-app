<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MűszakApp</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --day:   #F5A623;
  --night: #7B8CFF;
  --free:  #2DCB8A;
  --sub:   #FF5E5E;
  --subd:  #FF9A3C;
  --bg:    #0B0D12;
  --bg2:   #13161F;
  --bg3:   #1A1E2C;
  --bord:  rgba(255,255,255,.08);
  --text:  #F0F1F5;
  --muted: #5C6270;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html{height:100%;}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}

/* HEADER */
header{flex:0 0 auto;background:rgba(11,13,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bord);padding:12px 14px 0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(120deg,#F5A623,#9B6EF5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.today-chip{font-size:11px;font-weight:700;color:#0B0D12;background:var(--free);padding:3px 10px;border-radius:20px;}
.mrow{display:flex;align-items:center;gap:6px;}
.marr{background:none;border:1px solid var(--bord);color:var(--muted);width:28px;height:28px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.marr:active{background:var(--bg3);}
.mscroll{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;padding-bottom:10px;}
.mscroll::-webkit-scrollbar{display:none;}
.mbtn{flex:0 0 auto;padding:5px 12px;border-radius:14px;border:1px solid var(--bord);background:var(--bg2);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.mbtn.active{background:linear-gradient(120deg,#F5A623,#E8821D);color:#000;border-color:transparent;font-weight:700;}
.legend{display:flex;gap:10px;padding:4px 0 8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.3px;}
.ldot{width:8px;height:8px;border-radius:2px;}

/* SWIPE */
.swipe-outer{flex:1;overflow:hidden;position:relative;}
.swipe-track{display:flex;height:100%;transition:transform .34s cubic-bezier(.4,0,.2,1);will-change:transform;}
.swipe-page{flex:0 0 100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-inner{max-width:480px;margin:0 auto;padding:0 10px 100px;}

/* MONTH TITLE */
.mtitle{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;padding:12px 2px 8px;display:flex;align-items:baseline;gap:8px;}
.mtitle small{font-size:13px;font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif;}

/* SUMMARY */
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.sc{background:var(--bg2);border:1px solid var(--bord);border-radius:12px;padding:10px 10px;}
.sc-v{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;}
.sc-l{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.3px;}

/* WEEK LABELS */
.wlbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.wl{text-align:center;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;padding:2px 0;}
.wl:nth-child(6),.wl:nth-child(7){color:rgba(255,94,94,.7);}

/* CALENDAR GRID */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}

/* DAY CELL */
.dc{
  border-radius:10px;
  aspect-ratio: 1 / 1.15;
  border:1px solid var(--bord);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;position:relative;
  transition:transform .12s;
}
.dc:active{transform:scale(.90);}
.dc.empty{background:transparent;border-color:transparent;pointer-events:none;}

/* colored backgrounds */
.dc.day  {background:rgba(245,166,35,.13);}
.dc.night{background:rgba(123,140,255,.12);}
.dc.free {background:rgba(45,203,138,.09);}
.dc.sub  {background:rgba(255,94,94,.12);}
.dc.sub-day{background:rgba(255,154,60,.12);}

/* top bar */
.dc-bar{height:4px;width:100%;flex-shrink:0;}
.dc.day   .dc-bar{background:var(--day);}
.dc.night .dc-bar{background:var(--night);}
.dc.free  .dc-bar{background:var(--free);}
.dc.sub   .dc-bar{background:var(--sub);}
.dc.sub-day .dc-bar{background:var(--subd);}

/* today ring */
.dc.today{box-shadow:0 0 0 2px var(--free),0 0 16px rgba(45,203,138,.28);}

/* emoji */
.dc-ico{font-size:14px;line-height:1;margin-top:5px;}

/* date number */
.dc-num{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1;margin-top:2px;}
.dc.day   .dc-num{color:var(--day);}
.dc.night .dc-num{color:var(--night);}
.dc.free  .dc-num{color:var(--free);}
.dc.sub   .dc-num{color:var(--sub);}
.dc.sub-day .dc-num{color:var(--subd);}
.dc.today .dc-num{color:#fff;}

/* label pill */
.dc-lbl{
  font-size:8px;font-weight:800;letter-spacing:.5px;
  padding:2px 4px;border-radius:5px;margin-top:auto;margin-bottom:4px;
  line-height:1.3;text-align:center;width:calc(100% - 6px);
}
.dc.day   .dc-lbl{background:rgba(245,166,35,.28);color:var(--day);}
.dc.night .dc-lbl{background:rgba(123,140,255,.28);color:var(--night);}
.dc.free  .dc-lbl{background:rgba(45,203,138,.22);color:var(--free);}
.dc.sub   .dc-lbl{background:rgba(255,94,94,.24);color:var(--sub);}
.dc.sub-day .dc-lbl{background:rgba(255,154,60,.24);color:var(--subd);}

/* override dot */
.ovrdt{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:#fff;opacity:.6;}

/* SECTION */
.sechdr{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin:16px 2px 8px;}

/* UPCOMING CARDS */
.ucard{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--bord);border-radius:13px;padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:background .15s;}
.ucard:active{background:var(--bg3);}
.ucard-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
.ucard-ico.day  {background:rgba(245,166,35,.18);}
.ucard-ico.night{background:rgba(123,140,255,.18);}
.ucard-ico.free {background:rgba(45,203,138,.15);}
.ucard-ico.sub  {background:rgba(255,94,94,.16);}
.ucard-ico.sub-day{background:rgba(255,154,60,.16);}
.ucard-body{flex:1;min-width:0;}
.ucard-date{font-size:13px;font-weight:600;}
.ucard-desc{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ubadge{font-size:10px;font-weight:800;letter-spacing:.4px;padding:4px 9px;border-radius:18px;flex:0 0 auto;}
.ubadge.day  {background:rgba(245,166,35,.22);color:var(--day);}
.ubadge.night{background:rgba(123,140,255,.22);color:var(--night);}
.ubadge.free {background:rgba(45,203,138,.18);color:var(--free);}
.ubadge.sub  {background:rgba(255,94,94,.2);color:var(--sub);}
.ubadge.sub-day{background:rgba(255,154,60,.2);color:var(--subd);}

/* SHARE */
.share-box{background:var(--bg2);border:1px solid var(--bord);border-radius:14px;padding:13px 14px;margin:8px 0 20px;}
.share-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.sbtn{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sbtn.copy{background:rgba(123,140,255,.2);color:var(--night);}
.sbtn.wa{background:rgba(37,211,102,.18);color:#25D366;}
.sbtn.mail{background:rgba(245,166,35,.2);color:var(--day);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--bord);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:16px 16px 40px;transform:translateY(80px);transition:transform .3s cubic-bezier(.34,1.4,.64,1);}
.overlay.open .modal{transform:translateY(0);}
.mhandle{width:32px;height:4px;border-radius:2px;background:var(--bord);margin:0 auto 14px;}
.mdate{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:2px;}
.mcurr{font-size:11px;color:var(--muted);margin-bottom:12px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.tbtn{padding:11px 6px;border-radius:11px;border:1px solid var(--bord);background:var(--bg3);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;font-family:'DM Sans',sans-serif;}
.tbtn.active{border-color:transparent;}
.tbtn.active.day  {background:var(--day);color:#000;}
.tbtn.active.night{background:var(--night);color:#fff;}
.tbtn.active.free {background:var(--free);color:#000;}
.tbtn.active.sub  {background:var(--sub);color:#fff;}
.tbtn.active.sub-day{background:var(--subd);color:#000;}
.mlbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin:0 0 5px;}
.minput{width:100%;background:var(--bg3);border:1px solid var(--bord);border-radius:9px;color:var(--text);padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;}
.minput:focus{border-color:rgba(123,140,255,.5);}
.macts{display:flex;gap:7px;margin-top:14px;}
.msave{flex:1;padding:13px;border-radius:11px;background:linear-gradient(135deg,#7B8CFF,#9B6EF5);color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mdel{padding:13px 15px;border-radius:11px;background:rgba(255,94,94,.14);color:var(--sub);font-weight:600;font-size:14px;border:1px solid rgba(255,94,94,.3);cursor:pointer;font-family:'DM Sans',sans-serif;}
.mclose{width:100%;padding:12px;border-radius:11px;background:var(--bg3);color:var(--muted);font-weight:600;font-size:14px;border:1px solid var(--bord);cursor:pointer;margin-top:7px;font-family:'DM Sans',sans-serif;}

/* FAB */
.fab{position:fixed;bottom:20px;right:16px;z-index:200;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#F5A623,#E8821D);border:none;font-size:18px;cursor:pointer;box-shadow:0 6px 20px rgba(245,166,35,.5);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.fab:active{transform:scale(.88);}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--free);color:#000;padding:8px 18px;border-radius:18px;font-weight:700;font-size:12px;opacity:0;transition:all .28s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="logo">⏱ MűszakApp</div>
    <div class="today-chip">Ma: ápr 30.</div>
  </div>
  <div class="mrow">
    <button class="marr" onclick="shiftMonth(-1)">‹</button>
    <div class="mscroll" id="mscroll"></div>
    <button class="marr" onclick="shiftMonth(1)">›</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="ldot" style="background:var(--day)"></div>NAPPAL</div>
    <div class="leg"><div class="ldot" style="background:var(--night)"></div>ÉJSZAKA</div>
    <div class="leg"><div class="ldot" style="background:var(--free)"></div>SZABAD</div>
    <div class="leg"><div class="ldot" style="background:var(--sub)"></div>HELYETTES.</div>
  </div>
</header>

<div class="swipe-outer" id="swipeOuter">
  <div class="swipe-track" id="swipeTrack"></div>
</div>

<div class="overlay" id="overlay" onclick="oClick(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mdate" id="mDate"></div>
    <div class="mcurr" id="mCurr"></div>
    <div class="tgrid">
      <button class="tbtn day"     data-t="day"    >☀️ Nappalos</button>
      <button class="tbtn night"   data-t="night"  >🌙 Éjszakás</button>
      <button class="tbtn free"    data-t="free"   >✨ Szabad</button>
      <button class="tbtn sub"     data-t="sub"    >🔄 Helyet. Éjjel</button>
      <button class="tbtn sub-day" data-t="sub-day">🔄 Helyet. Nappal</button>
    </div>
    <div class="mlbl">MEGJEGYZÉS / KOLLÉGA NEVE</div>
    <textarea class="minput" id="mNote" rows="3" placeholder="Pl.: Attila helyett, 18:00–06:00..."></textarea>
    <div class="macts">
      <button class="msave" onclick="saveModal()">💾 Mentés</button>
      <button class="mdel"  onclick="delModal()">🗑</button>
    </div>
    <button class="mclose" onclick="closeModal()">Mégse</button>
  </div>
</div>

<button class="fab" onclick="fabShare()">⇧</button>
<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ══
const TODAY=new Date(2026,3,30);
const MNAMES=['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
const MSHORT=['jan','feb','már','ápr','máj','jún','júl','aug','szep','okt','nov','dec'];
const DFULL=['Vasárnap','Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat'];
const DSHORT=['V','H','K','Sze','Cs','P','Szo'];
const ICONS={day:'☀️',night:'🌙',free:'✨',sub:'🔄','sub-day':'🔄'};
const LABELS={day:'NAP',night:'ÉJJ',free:'SZB',sub:'H.É','sub-day':'H.N'};
const DESCS={day:'Nappalos műszak 06:00–18:00',night:'Éjszakás műszak 18:00–06:00',free:'Szabad nap',sub:'Helyettesítés – éjszaka','sub-day':'Helyettesítés – nappal'};

// Cycle: ref Apr 27 2026 = pos 0 → day(0-3),free(4-7),night(8-11),free(12-15)
function cycleType(date){
  const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const r=new Date(2026,3,27);
  const p=((Math.round((d-r)/86400000)%16)+16)%16;
  return p<4?'day':p<8?'free':p<12?'night':'free';
}
function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getOvr(){try{return JSON.parse(localStorage.getItem('ms3')||'{}')}catch{return {}}}
function setOvr(o){localStorage.setItem('ms3',JSON.stringify(o));}
function getShift(date){const k=dk(date);const o=getOvr();return o[k]||{type:cycleType(date),note:''};}

// ══ MONTHS ══
const MONTHS=[];
for(let y=2026;y<=2027;y++)for(let m=0;m<12;m++){if(y===2026&&m<3)continue;MONTHS.push({y,m});}
let curIdx=MONTHS.findIndex(x=>x.y===2026&&x.m===3);
let pages=[];

// ══ BUILD PAGES ══
function buildAllPages(){
  const track=document.getElementById('swipeTrack');
  track.innerHTML='';pages=[];
  MONTHS.forEach((mon)=>{
    const p=document.createElement('div');
    p.className='swipe-page';
    p.innerHTML=`<div class="page-inner">${pageHTML(mon.y,mon.m)}</div>`;
    track.appendChild(p);
    pages.push(p);
  });
  setPos(false);
  attachSwipe();
}

function rebuildPages(){
  pages.forEach((p,i)=>{
    const mon=MONTHS[i];
    p.querySelector('.page-inner').innerHTML=pageHTML(mon.y,mon.m);
  });
}

function pageHTML(y,m){
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  let dayCnt=0,nightCnt=0,hrs=0;
  for(let d=1;d<=last.getDate();d++){
    const s=getShift(new Date(y,m,d));
    if(s.type==='day'){dayCnt++;hrs+=12;}
    else if(s.type==='night'){nightCnt++;hrs+=12;}
    else if(s.type==='sub'||s.type==='sub-day')hrs+=12;
  }

  let h=`<div class="mtitle">${MNAMES[m]} <small>${y}</small></div>
  <div class="sumrow">
    <div class="sc"><div class="sc-v" style="color:var(--day)">${dayCnt}</div><div class="sc-l">☀️ NAPPAL</div></div>
    <div class="sc"><div class="sc-v" style="color:var(--night)">${nightCnt}</div><div class="sc-l">🌙 ÉJSZAKA</div></div>
    <div class="sc"><div class="sc-v" style="color:var(--day)">${hrs}h</div><div class="sc-l">⏱ ÖSSZ ÓRA</div></div>
  </div>
  <div class="wlbls">${['H','K','Sze','Cs','P','Szo','V'].map(d=>`<div class="wl">${d}</div>`).join('')}</div>
  <div class="calgrid">`;

  for(let i=0;i<startDow;i++) h+=`<div class="dc empty"></div>`;
  const ovr=getOvr();
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d);
    const s=getShift(dt);
    const key=dk(dt);
    const isT=(dt.toDateString()===TODAY.toDateString());
    const isO=!!ovr[key];
    h+=`<div class="dc ${s.type}${isT?' today':''}" onclick="openModal('${key}')">
      <div class="dc-bar"></div>
      ${isO?'<div class="ovrdt"></div>':''}
      <div class="dc-ico">${ICONS[s.type]}</div>
      <div class="dc-num">${d}</div>
      <div class="dc-lbl">${LABELS[s.type]}</div>
    </div>`;
  }
  h+=`</div>`;

  // upcoming on today's month or adjacent
  const todayInRange=new Date(y,m,1)<=TODAY&&TODAY<=new Date(y,m+1,0);
  const nextMonth=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,1);
  const nextInRange=new Date(y,m,1).getTime()===nextMonth.getTime();
  if(todayInRange||nextInRange){
    h+=`<div class="sechdr">Közelgő műszakok</div>`;
    for(let i=0;i<10;i++){
      const dt=new Date(TODAY);dt.setDate(TODAY.getDate()+i);
      const s=getShift(dt);
      h+=`<div class="ucard" onclick="openModal('${dk(dt)}')">
        <div class="ucard-ico ${s.type}">${ICONS[s.type]}</div>
        <div class="ucard-body">
          <div class="ucard-date">${DFULL[dt.getDay()]}, ${dt.getMonth()+1}. ${dt.getDate()}.</div>
          <div class="ucard-desc">${s.note||DESCS[s.type]}</div>
        </div>
        <div class="ubadge ${s.type}">${LABELS[s.type]}</div>
      </div>`;
    }
  }

  h+=`<div class="sechdr">Megosztás</div>
  <div class="share-box">
    <div style="font-size:11px;color:var(--muted)">Küldd el a párodnak vagy kollégádnak 📤</div>
    <div class="share-row">
      <button class="sbtn copy" onclick="doCopy(${y},${m})">📋 Másolás</button>
      <button class="sbtn wa"   onclick="doWA(${y},${m})">💬 WhatsApp</button>
      <button class="sbtn mail" onclick="doMail(${y},${m})">📧 Email</button>
    </div>
  </div>`;

  return h;
}

// ══ POSITION ══
function setPos(anim){
  const t=document.getElementById('swipeTrack');
  t.style.transition=anim?'transform .34s cubic-bezier(.4,0,.2,1)':'none';
  t.style.transform=`translateX(${-curIdx*100}%)`;
}
function goTo(idx,anim=true){
  curIdx=Math.max(0,Math.min(MONTHS.length-1,idx));
  setPos(anim);
  syncNav();
  setTimeout(()=>{if(pages[curIdx])pages[curIdx].scrollTop=0;},60);
}
function shiftMonth(d){goTo(curIdx+d);}

// ══ SWIPE ══
let sx=0,sy=0,swiping=false,scrolling=false;
function attachSwipe(){
  const el=document.getElementById('swipeOuter');
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=false;scrolling=false;},{passive:true});
  el.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(!swiping&&!scrolling){
      if(Math.abs(dx)>Math.abs(dy)+8)swiping=true;
      else if(Math.abs(dy)>Math.abs(dx)+8)scrolling=true;
    }
    if(swiping){
      e.preventDefault();
      const t=document.getElementById('swipeTrack');
      t.style.transition='none';
      t.style.transform=`translateX(calc(${-curIdx*100}% + ${dx}px))`;
    }
  },{passive:false});
  el.addEventListener('touchend',e=>{
    if(!swiping)return;
    const dx=e.changedTouches[0].clientX-sx;
    if(dx<-50)goTo(curIdx+1);
    else if(dx>50)goTo(curIdx-1);
    else setPos(true);
    swiping=false;
  });
}

// ══ MONTH NAV ══
function buildNav(){
  const sc=document.getElementById('mscroll');
  sc.innerHTML='';
  MONTHS.forEach((mon,i)=>{
    const b=document.createElement('button');
    b.className='mbtn'+(i===curIdx?' active':'');
    b.textContent=`${MSHORT[mon.m]} ${mon.y}`;
    b.onclick=()=>goTo(i);
    sc.appendChild(b);
  });
  scrollActiveNav();
}
function syncNav(){
  document.querySelectorAll('#mscroll .mbtn').forEach((b,i)=>b.classList.toggle('active',i===curIdx));
  scrollActiveNav();
}
function scrollActiveNav(){
  const a=document.querySelector('#mscroll .mbtn.active');
  if(a)setTimeout(()=>a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);
}

// ══ MODAL ══
let mKey=null,selType=null;
document.querySelectorAll('.tbtn').forEach(b=>{
  b.onclick=()=>{
    selType=b.dataset.t;
    document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  };
});
function openModal(key){
  mKey=key;
  const [y,m,d]=key.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const s=getShift(dt);
  selType=s.type;
  document.getElementById('mDate').textContent=`${DFULL[dt.getDay()]}, ${y}. ${MSHORT[m-1]}. ${d}.`;
  document.getElementById('mCurr').textContent=DESCS[s.type]||'';
  document.getElementById('mNote').value=s.note||'';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.t===selType));
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function saveModal(){
  const o=getOvr();
  const [y,m,d]=mKey.split('-').map(Number);
  const base=cycleType(new Date(y,m-1,d));
  const note=document.getElementById('mNote').value.trim();
  if(selType===base&&!note)delete o[mKey];else o[mKey]={type:selType,note};
  setOvr(o);closeModal();rebuildPages();showToast('✅ Mentve!');
}
function delModal(){
  const o=getOvr();delete o[mKey];setOvr(o);
  closeModal();rebuildPages();showToast('🗑️ Törölve');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function oClick(e){if(e.target.id==='overlay')closeModal();}

// ══ SHARE ══
function buildTxt(y,m){
  let t=`📅 Műszak – ${MNAMES[m]} ${y}\n\n`;
  const days=new Date(y,m+1,0).getDate();
  const lmap={day:'☀️ Nappal',night:'🌙 Éjszaka',free:'✨ Szabad',sub:'🔄 Helyet.É','sub-day':'🔄 Helyet.N'};
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);const s=getShift(dt);
    t+=`${String(d).padStart(2,'0')}. ${DSHORT[dt.getDay()]}  ${lmap[s.type]}`;
    if(s.note)t+=` – ${s.note}`;
    t+='\n';
  }
  return t+'\n📱 MűszakApp';
}
function doCopy(y,m){navigator.clipboard.writeText(buildTxt(y,m)).then(()=>showToast('📋 Másolva!')).catch(()=>showToast('Sikertelen'));}
function doWA(y,m){window.open(`https://wa.me/?text=${encodeURIComponent(buildTxt(y,m))}`);}
function doMail(y,m){window.location.href=`mailto:?subject=${encodeURIComponent('Műszak beosztás')}&body=${encodeURIComponent(buildTxt(y,m))}`;}
function fabShare(){const mon=MONTHS[curIdx];doWA(mon.y,mon.m);}

// ══ TOAST ══
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ══ INIT ══
(function initDefaults(){
  const o=getOvr();
  const defs={'2026-05-03':{type:'sub',note:'Attila helyett – éjszaka'},'2026-05-04':{type:'sub',note:'Attila helyett – éjszaka'}};
  let ch=false;
  Object.keys(defs).forEach(k=>{if(!o[k]){o[k]=defs[k];ch=true;}});
  if(ch)setOvr(o);
})();

buildNav();
buildAllPages();
</script>
